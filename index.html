<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hizliyim.com - HizliSystems</title>
    
    <link rel="icon" type="image/png" href="sonlogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const myFirebaseConfig = {
            apiKey: "AIzaSyCP0Rd8CAfzYRPtakfdQWBqS5uBn045XpE",
            authDomain: "hizliyimforum.firebaseapp.com",
            databaseURL: "https://hizliyimforum-default-rtdb.firebaseio.com",
            projectId: "hizliyimforum",
            storageBucket: "hizliyimforum.firebasestorage.app",
            messagingSenderId: "903963422468",
            appId: "1:903963422468:web:936c368393585efd0cea51"
        };

        let db, auth, userId, currentUserEmail;

        try {
            const app = initializeApp(myFirebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (e) { console.error(e); }

        // --- GERÇEKÇİ PASSKEY KAYIT (REGISTRATION) ---
        async function registerPasskey() {
            if (!currentUserEmail) return;
            try {
                const challenge = window.crypto.getRandomValues(new Uint8Array(32));
                const createCredentialOptions = {
                    publicKey: {
                        challenge,
                        rp: { name: "hizliyim.com", id: window.location.hostname },
                        user: {
                            id: Uint8Array.from(currentUserEmail, c => c.charCodeAt(0)),
                            name: currentUserEmail,
                            displayName: currentUserEmail
                        },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { userVerification: "required" },
                        timeout: 60000
                    }
                };

                const credential = await navigator.credentials.create(createCredentialOptions);
                if (credential) {
                    // Firebase'e bu cihazın Passkey özelliğini "aktif" olarak kaydediyoruz
                    const userRef = doc(db, "users", currentUserEmail.toLowerCase());
                    await updateDoc(userRef, { hasPasskey: true });
                    alert("Başarılı! Artık bu cihazda parmak iziyle giriş yapabilirsin balımmmm.");
                }
            } catch (err) {
                console.error(err);
                alert("Kayıt sırasında bir hata oluştu.");
            }
        }

        // --- GERÇEKÇİ PASSKEY GİRİŞ (LOGIN) ---
        async function handlePasskeyLogin() {
            if (!window.PublicKeyCredential) {
                showError('login', "Cihazınız desteklemiyor.");
                return;
            }

            toggleLoading('login', true);
            try {
                const challenge = window.crypto.getRandomValues(new Uint8Array(32));
                const credential = await navigator.credentials.get({
                    publicKey: {
                        challenge,
                        timeout: 60000,
                        userVerification: "required"
                    }
                });

                if (credential) {
                    // Simülasyon: Veritabanında bu anahtara sahip bir kullanıcı olduğunu varsayıyoruz
                    window.location.hash = '#/home';
                }
            } catch (err) {
                showError('login', "Biyometrik doğrulama alınamadı.");
            } finally {
                toggleLoading('login', false);
            }
        }

        // --- AUTH & ROUTER ---
        async function authenticateUser() {
            onAuthStateChanged(auth, (user) => {
                if (!user) signInAnonymously(auth);
                window.router.initialize();
            });
        }

        const router = {
            routes: { '#/login': 'login', '#/register': 'register', '#/home': 'home' },
            load: () => {
                const hash = window.location.hash || '#/login';
                const page = router.routes[hash] || 'login';
                document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
                document.getElementById(`page-${page}`)?.classList.remove('hidden');
                document.getElementById(`page-${page}`)?.classList.add('animate-pop-in');
            },
            initialize: () => {
                window.addEventListener('hashchange', router.load);
                router.load();
            }
        };
        window.router = router;

        document.addEventListener('DOMContentLoaded', () => {
            authenticateUser();
            checkTimeAndApplyTheme();

            document.getElementById('form-login')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value.trim();
                const pass = document.getElementById('login-password').value;
                toggleLoading('login', true);
                
                const userRef = doc(db, "users", email.toLowerCase());
                const docSnap = await getDoc(userRef);
                
                if (docSnap.exists() && docSnap.data().password === pass) {
                    currentUserEmail = email;
                    window.location.hash = '#/home';
                } else {
                    showError('login', "Hatalı bilgiler!");
                }
                toggleLoading('login', false);
            });

            document.getElementById('other-options-trigger')?.addEventListener('click', () => {
                document.getElementById('passkey-panel').classList.toggle('hidden');
            });

            document.getElementById('btn-passkey-login')?.addEventListener('click', handlePasskeyLogin);
            document.getElementById('btn-register-passkey')?.addEventListener('click', registerPasskey);
        });

        // Yardımcı Fonksiyonlar
        function toggleLoading(type, isLoading) {
            const loading = document.getElementById(`${type}-loading`);
            loading.classList.toggle('hidden', !isLoading);
        }

        function showError(type, message) {
            const err = document.getElementById(`${type}-error`);
            err.textContent = message;
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 3000);
        }

        function checkTimeAndApplyTheme() {
            const isNight = new Date().getHours() < 6 || new Date().getHours() >= 20;
            document.body.className = isNight ? 'night-mode' : 'day-mode';
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; transition: 1s; }
        body.day-mode { background: linear-gradient(125deg, #001f3f, #027aff); }
        body.night-mode { background: #000; }
        
        .glass-panel { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 2.5rem; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: white; text-align: center; }
        
        .custom-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 15px; color: white; margin-bottom: 10px; outline: none; transition: 0.3s; }
        .custom-input:focus { border-color: #027aff; background: rgba(0,0,0,0.4); }
        
        .action-btn { width: 100%; background: white; color: #027aff; font-weight: 800; padding: 14px; border-radius: 15px; cursor: pointer; border: none; transition: 0.3s; }
        .action-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .passkey-btn { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        
        .divider { display: flex; align-items: center; margin: 20px 0; gap: 10px; opacity: 0.4; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .divider-line { flex: 1; height: 1px; background: white; }

        .animate-pop-in { animation: popIn 0.4s ease-out forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .neon-logo { width: 70px; filter: invert(1) drop-shadow(0 0 10px #027aff); margin-bottom: 1rem; }
    </style>
</head>
<body>
    <!-- Login Sayfası -->
    <div id="page-login" class="page-content hidden w-full flex justify-center">
        <div class="glass-panel">
            <img src="sonlogo.png" alt="Logo" class="neon-logo mx-auto">
            <h1 class="text-3xl font-black mb-6 italic tracking-tighter">hizliyim.com</h1>
            
            <div id="login-error" class="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-xl mb-4 hidden text-sm"></div>
            <div id="login-loading" class="hidden mb-4 animate-pulse text-[10px] uppercase tracking-widest opacity-60">İşlem yapılıyor...</div>

            <form id="form-login">
                <input type="email" id="login-email" placeholder="E-mail Adresi" class="custom-input" required>
                <input type="password" id="login-password" placeholder="Şifre" class="custom-input" required>
                <button type="submit" class="action-btn">Giriş Yap</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <button id="other-options-trigger">Other</button>
                <div class="divider-line"></div>
            </div>

            <div id="passkey-panel" class="hidden">
                <button id="btn-passkey-login" class="passkey-btn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.81 4.47c-.08 0-.16.02-.23.06C15.6 5.57 14 7.55 14 9c0 1.66 1.34 3 3 3s3-1.34 3-3c0-1.45-1.6-3.43-3.58-4.47-.07-.04-.15-.06-.23-.06zM9 11V9H5v2H3v2h2v2h2v-2h2v-2H9zm0-2c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/></svg>
                    Passkey ile Hızlı Giriş
                </button>
            </div>
            
            <div class="mt-6 text-xs opacity-60">Hesabın yok mu? <a href="#/register" class="font-bold underline text-white">Kayıt Ol</a></div>
        </div>
    </div>

    <!-- Home Sayfası -->
    <div id="page-home" class="page-content hidden w-full flex justify-center">
        <div class="glass-panel">
            <h1 class="text-2xl font-bold mb-2">Hoşgeldin Balım!</h1>
            <p class="text-sm opacity-70 mb-8">Hesabın şimdilik beklemede ama işleri hızlandırabiliriz.</p>
            
            <div class="bg-white/5 border border-white/10 p-4 rounded-2xl mb-6">
                <p class="text-[11px] uppercase tracking-wider font-black mb-3 opacity-50">Güvenlik Ayarları</p>
                <button id="btn-register-passkey" class="passkey-btn !mt-0 !bg-blue-600/40 !border-blue-500/50">
                    Bu Cihazı Passkey Olarak Kaydet
                </button>
                <p class="text-[9px] mt-2 opacity-40">Kaydettikten sonra şifre girmene gerek kalmaz!</p>
            </div>

            <button onclick="location.hash='#/login'" class="action-btn !bg-red-500 !color-white text-white">Çıkış Yap</button>
        </div>
    </div>
</body>
</html>
